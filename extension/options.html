<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clickbait Detector Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      min-width: 320px;
      color: #202124;
    }
    h2 { margin-top: 0; font-size: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #dadce0;
      border-radius: 4px;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    #status { margin-top: 10px; font-size: 12px; color: #188038; min-height: 16px; }
  </style>
</head>
<body>
  <h2>Clickbait Detector Settings</h2>
  <label for="backendUrl">Backend URL</label>
  <input type="text" id="backendUrl" placeholder="http://localhost:4004">
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
